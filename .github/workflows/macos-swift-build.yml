name: macOS Swift Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Compile Swift App Sources
        run: |
          set -e
          cd PlexTVEditor
          swiftc \
            -parse-as-library \
            -framework SwiftUI \
            -framework Foundation \
            -framework Cocoa \
            -framework UserNotifications \
            PlexTVEditorApp.swift \
            ContentView.swift \
            PlexTVEditorViewModel.swift \
            PlexDatabaseManager.swift \
            TMDBClient.swift \
            -o /tmp/PlexTVEditor-ci-check

      - name: Run Quality Gate (Non-Live)
        run: |
          set -e
          chmod +x ./run_quality_gate.sh
          chmod +x ./run_live_plex_smoke.sh
          ./run_quality_gate.sh --skip-build
